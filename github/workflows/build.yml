name: Build RFS Binaries

on:
  push:
    tags:
      - 'release' # Startet automatisch, wenn du den Tag "release" setzt
  workflow_dispatch: # Das zaubert dir einen manuellen "Play-Button" auf GitHub!

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            cc: g++
            artifact_name: rfs-linux
          - os: windows
            cc: x86_64-w64-mingw32-g++
            artifact_name: rfs-windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64

      - name: Compile
        run: |
          # -O3 für maximale Performance
          # -static für "Batteries Included" (keine fehlenden Bibliotheken beim Nutzer)
          ${{ matrix.cc }} -O3 rfs.cpp -o ${{ matrix.artifact_name }} -static

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}